<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itinerary</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2a2d3a;
    --accent: #4f8ef7;
    --green: #3ecf8e;
    --yellow: #f5c842;
    --red: #f76f6f;
    --muted: #7a7f94;
    --text: #e8eaf0;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); }
  .trip-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; }
  .trip-title { font-size: 22px; font-weight: 700; }
  .trip-updated { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 6px; }

  main { max-width: 600px; margin: 0 auto; padding: 0 0 70px; }

  /* ====== TIMELINE ====== */
  .timeline { display: flex; flex-direction: column; padding: 8px 16px 0; }

  /* Row = dot column + content */
  .tl-row { display: flex; gap: 0; }
  .tl-col-line { width: 40px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .tl-col-body { flex: 1; min-width: 0; }

  /* ---- Stop row ---- */
  .tl-stop-dot {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2.5px solid var(--border); background: var(--bg);
    flex-shrink: 0; z-index: 2; margin-top: 14px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .tl-stop-dot.upcoming  { border-color: var(--border); }
  .tl-stop-dot.enroute   { border-color: var(--yellow); background: rgba(245,200,66,0.15); }
  .tl-stop-dot.at_stop   { border-color: var(--green); background: rgba(62,207,142,0.15); box-shadow: 0 0 10px rgba(62,207,142,0.35); animation: pulse 2s infinite; }
  .tl-stop-dot.done      { border-color: var(--muted); background: var(--muted); }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 6px rgba(62,207,142,0.3); }
    50%      { box-shadow: 0 0 16px rgba(62,207,142,0.65); }
  }

  .stop-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin: 8px 0 0;
    transition: border-color 0.3s;
  }
  .stop-card.at_stop { border-color: var(--green); }
  .stop-card.enroute { border-color: var(--yellow); }
  .stop-card.done    { opacity: 0.5; }

  .stop-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .stop-name { font-size: 16px; font-weight: 600; }

  .stop-badge {
    font-size: 10px; font-family: var(--mono); padding: 2px 9px;
    border-radius: 10px; text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0;
  }
  .badge-upcoming { background: rgba(79,142,247,0.12); color: var(--accent); }
  .badge-enroute  { background: rgba(245,200,66,0.15); color: var(--yellow); }
  .badge-at_stop  { background: rgba(62,207,142,0.12); color: var(--green); }
  .badge-done     { background: rgba(122,127,148,0.1); color: var(--muted); }

  /* Times */
  .times-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .time-blk-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .time-line { display: flex; align-items: baseline; gap: 5px; }
  .t-est  { font-family: var(--mono); font-size: 14px; color: var(--muted); }
  .t-arr  { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--text); }
  .t-arrow { font-size: 11px; color: var(--border); }
  .t-empty { font-family: var(--mono); font-size: 14px; color: var(--border); }
  .delta {
    font-size: 10px; font-family: var(--mono); padding: 1px 5px; border-radius: 3px;
  }
  .delta-late  { background: rgba(247,111,111,0.15); color: var(--red); }
  .delta-early { background: rgba(62,207,142,0.15); color: var(--green); }

  .stop-note { font-size: 13px; color: var(--muted); margin-top: 10px; font-style: italic; border-top: 1px solid var(--border); padding-top: 8px; }

  /* ---- Leg / enroute connector ---- */
  .tl-leg-row { display: flex; gap: 0; }
  .tl-leg-line-col { width: 40px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .tl-leg-vline {
    width: 2px; flex: 1; min-height: 50px;
    background: var(--border);
    transition: background 0.3s;
  }
  .tl-leg-vline.enroute { background: var(--yellow); }
  .tl-leg-vline.done    { background: var(--muted); }

  .leg-card {
    flex: 1; margin: 6px 0; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; display: flex; flex-direction: column; gap: 4px;
    transition: border-color 0.3s;
  }
  .leg-card.enroute { border-color: var(--yellow); }
  .leg-card.done    { opacity: 0.5; }

  .leg-top { display: flex; align-items: center; justify-content: space-between; }
  .leg-route-label { font-size: 12px; color: var(--muted); }
  .leg-status-badge {
    font-size: 10px; font-family: var(--mono); padding: 2px 8px;
    border-radius: 10px; text-transform: uppercase;
  }
  .leg-badge-enroute { background: rgba(245,200,66,0.15); color: var(--yellow); }
  .leg-badge-done    { background: rgba(122,127,148,0.1); color: var(--muted); }
  .leg-badge-upcoming { background: rgba(79,142,247,0.08); color: var(--muted); }

  .leg-times { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .leg-depart { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .leg-arrow  { color: var(--muted); font-size: 13px; }
  .leg-arrive { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .leg-dur    { font-size: 11px; color: var(--muted); margin-left: auto; }
  .leg-dur strong { color: var(--text); }

  /* ---- Bottom bar ---- */
  .refresh-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; font-size: 12px; color: var(--muted);
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
  .refresh-btn {
    font-size: 12px; background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 5px; padding: 4px 10px; cursor: pointer;
  }
  .refresh-btn:hover { color: var(--text); }

  /* Loading / error */
  .center-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .spinner { display: inline-block; width: 22px; height: 22px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-gist { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 28px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.8; margin: 40px 16px; }
  .no-gist strong { color: var(--text); }
  code { font-family: var(--mono); background: var(--surface2); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
</style>
</head>
<body>

<div id="app"><div class="center-msg"><div class="spinner"></div><br>Loading itinerary…</div></div>

<div class="refresh-bar">
  <span><span class="live-dot"></span>auto-refresh 30s</span>
  <span id="lastRefresh" style="color:var(--muted)"></span>
  <button class="refresh-btn" onclick="load()">↻ now</button>
</div>

<script>
const params = new URLSearchParams(location.search);
const gistId = params.get('gist');

function pad(n) { return String(n).padStart(2,'0'); }

function timeDelta(est, act) {
  if (!est || !act) return '';
  const [eh,em] = est.split(':').map(Number);
  const [ah,am] = act.split(':').map(Number);
  const diff = (ah*60+am) - (eh*60+em);
  if (diff === 0) return '';
  const abs = Math.abs(diff);
  const label = (diff>0?'+':'-') + abs + 'm';
  return diff > 0
    ? `<span class="delta delta-late">${label}</span>`
    : `<span class="delta delta-early">${label}</span>`;
}

function fmtTime(t) {
  if (!t) return null;
  // Convert 24h HH:MM to 12h
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'pm' : 'am';
  const h12 = h % 12 || 12;
  return `${h12}:${pad(m)}<span style="font-size:10px;color:var(--muted)">${ampm}</span>`;
}

function timeBlock(label, est, act) {
  if (!est && !act) {
    return `<div>
      <div class="time-blk-label">${label}</div>
      <div class="time-line"><span class="t-empty">--:--</span></div>
    </div>`;
  }
  const estFmt = est ? `<span class="t-est">${fmtTime(est)}</span>` : '';
  const actFmt = act ? `<span class="t-arr">${fmtTime(act)}</span>` : '';
  const delta  = timeDelta(est, act);
  let line = '';
  if (act) {
    line = `${estFmt} <span class="t-arrow">→</span> ${actFmt} ${delta}`;
  } else {
    line = estFmt;
  }
  return `<div>
    <div class="time-blk-label">${label}</div>
    <div class="time-line">${line}</div>
  </div>`;
}

function legStatus(prevStop, nextStop, legIdx, stops) {
  // en route = prev stop departed (enroute status OR actDepart set), next not yet arrived
  const prev = stops[legIdx];
  const next = stops[legIdx + 1];
  if (!prev || !next) return 'upcoming';
  if (prev.status === 'enroute') return 'enroute';
  if (next.status === 'done' || next.status === 'at_stop') return 'done';
  if (prev.status === 'done' && (next.status === 'upcoming')) return 'upcoming';
  return 'upcoming';
}

function renderItinerary(data) {
  const rawStops = data.stops || [];
  const title    = data.title || 'Itinerary';
  const updated  = data.updated ? new Date(data.updated).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
  const last     = rawStops.length - 1;

  let html = `
    <header>
      <div class="trip-eyebrow">Live Itinerary</div>
      <div class="trip-title">${esc(title)}</div>
      <div class="trip-updated">Updated ${updated}</div>
    </header>
    <main><div class="timeline">
  `;

  rawStops.forEach((stop, i) => {
    const isFirst = i === 0;
    const isLast  = i === last;
    const t = stop.times || {};
    const s = stop.status || 'upcoming';

    // Badge label
    const badgeLabels = { upcoming:'upcoming', enroute:'en route', at_stop:'◉ at stop', done:'✓ done' };
    const badgeLabel  = badgeLabels[s] || s;

    // Build times section
    let timesHtml = '<div class="times-grid">';
    if (!isFirst) timesHtml += timeBlock('Arrive',  t.estArrive,  t.actArrive);
    else          timesHtml += '<div></div>';
    if (!isLast)  timesHtml += timeBlock('Depart',  t.estDepart,  t.actDepart);
    else          timesHtml += '<div></div>';
    timesHtml += '</div>';

    const noteHtml = stop.note ? `<div class="stop-note">${esc(stop.note)}</div>` : '';

    html += `
      <div class="tl-row">
        <div class="tl-col-line"><div class="tl-stop-dot ${s}"></div></div>
        <div class="tl-col-body">
          <div class="stop-card ${s}">
            <div class="stop-top">
              <span class="stop-name">${esc(stop.name || (isFirst?'Origin':isLast?'Destination':'Stop '+(i+1)))}</span>
              <span class="stop-badge badge-${s}">${badgeLabel}</span>
            </div>
            ${timesHtml}
            ${noteHtml}
          </div>
        </div>
      </div>
    `;

    // Leg connector between this stop and next
    if (!isLast) {
      const leg     = stop.leg || {};
      const nextStatus = rawStops[i+1]?.status;
      const legStat = s === 'enroute' ? 'enroute'
                    : (nextStatus === 'done' || nextStatus === 'at_stop') ? 'done'
                    : 'upcoming';

      const depTime  = t.actDepart || t.estDepart;
      const arrTime  = (rawStops[i+1]?.times || {}).actArrive || (rawStops[i+1]?.times || {}).estArrive;
      const durMin   = leg.estEnroute ? parseInt(leg.estEnroute,10) : null;
      const durLabel = durMin ? `<strong>${durMin}</strong> min` : '—';

      const legBadgeClass = legStat === 'enroute' ? 'leg-badge-enroute' : legStat === 'done' ? 'leg-badge-done' : 'leg-badge-upcoming';
      const legBadgeLabel = legStat === 'enroute' ? '▶ en route' : legStat === 'done' ? '✓ done' : 'transit';

      html += `
        <div class="tl-leg-row">
          <div class="tl-leg-line-col"><div class="tl-leg-vline ${legStat}"></div></div>
          <div class="tl-col-body">
            <div class="leg-card ${legStat}">
              <div class="leg-top">
                <span class="leg-route-label">${esc(stop.name||'Stop '+(i+1))} → ${esc(rawStops[i+1]?.name||'Stop '+(i+2))}</span>
                <span class="leg-status-badge ${legBadgeClass}">${legBadgeLabel}</span>
              </div>
              <div class="leg-times">
                <span class="leg-depart">${depTime ? fmtTime(depTime) : '<span style="color:var(--border)">--:--</span>'}</span>
                <span class="leg-arrow">→</span>
                <span class="leg-arrive">${arrTime ? fmtTime(arrTime) : '<span style="color:var(--border)">--:--</span>'}</span>
                <span class="leg-dur">${durLabel} est transit</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }
  });

  html += '</div></main>';
  document.getElementById('app').innerHTML = html;
  document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}


function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

async function load() {
  if (!gistId) {
    document.getElementById('app').innerHTML = `
      <div class="no-gist">
        <strong>No itinerary linked.</strong><br><br>
        Open <code>admin.html</code>, build your itinerary,<br>
        publish it, then tap <strong>Copy Viewer URL</strong>.<br><br>
        URL format: <code>index.html?gist=GIST_ID</code>
      </div>`;
    return;
  }
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const content = data.files?.['itinerary.json']?.content;
    if (!content) throw new Error('itinerary.json missing');
    renderItinerary(JSON.parse(content));
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="center-msg">Failed to load.<br><small style="color:var(--red)">${e.message}</small></div>`;
    document.getElementById('lastRefresh').textContent = 'error';
  }
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
